<!DOCTYPE html>

    type="image/x-icon"
    href="favicon.ico">

  <link rel="stylesheet" href="css/style.css?v=2">

  <!-- Font Awesome -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Font -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

<body class="dark-mode">

<!-- BURGER BUTTON -->

<button class="menu-toggle"
        id="menuToggle">

  <span></span>
  <span></span>

</button>

<!-- FULLSCREEN MENU -->

<div class="fullscreen-menu"
     id="fullscreenMenu">

  <a href="index.html"
     data-lang="nav_about">

    À propos

  </a>

  <a href="projects.html"
     data-lang="nav_projects">

    Projets

  </a>

  <a href="podcast.html"
     data-lang="nav_podcast">

    Podcast

  </a>

  <a href="contact.html"
     data-lang="nav_contact">

    Contact

  </a>

  <button id="langButton"
          class="lang-button">

    EN

  </button>

</div>

  <!-- Container -->

  <div class="container">

    <section class="card contact-card">

      <h2 data-lang="contact_title">
        Contact
      </h2>

      <div class="contact-icons">

        <!-- LinkedIn -->

        <a
          href="https://www.linkedin.com/in/alexandre-perrin-5253bb1b0/"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-icon">

          <i class="fa-brands fa-linkedin"></i>

        </a>

        <!-- Mail -->

        <a
          href="mailto:alexandreperrin555@gmail.com"
          class="contact-icon">

          <i class="fa-solid fa-envelope"></i>

        </a>

      </div>

    </section>

  </div>

<!-- THEME SWITCH -->

<button class="theme-switch"
        id="themeButton"
        onclick="toggleDarkMode()">

  <div class="theme-switch-circle">

    <span class="sun-icon">☀</span>
    <span class="moon-icon">☾</span>

  </div>

</button>

  <!-- Footer premium -->

  <footer class="site-footer">
  
    <div class="footer-blur"></div>
  
    <div class="footer-content"
         data-lang="footer_text">
  
      © <span id="year"></span>
      Alexandre Perrin — Tous droits réservés
  
    </div>
  
  </footer>

  <!-- Badge carbone -->

  <div class="carbon-wrapper">

    <div class="carbon-badge"
         id="carbonBadge">

      <div class="carbon-icon">
        🌱
      </div>

      <div class="carbon-content">

        <div class="carbon-title"
             data-lang="carbon_title">

          Impact estimé

        </div>

        <div class="carbon-value"
             id="carbonValue"
             data-lang="carbon_loading">

          Calcul...

        </div>

      </div>

    </div>

  </div>

<script src="js/theme.js?v=2"></script>
