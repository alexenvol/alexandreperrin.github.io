<!DOCTYPE html>

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

<body class="dark-mode">

<!-- BURGER BUTTON -->

<button class="menu-toggle"
        id="menuToggle">

<!-- FULLSCREEN MENU -->

<div class="fullscreen-menu"

  </a>

  <a href="podcast.html"

  </a>

  <a href="contact.html"

  </a>

  <button id="langButton"
          class="lang-button">

    EN

  </button>

</div>

  <div class="container">

    <section class="card">

      <h2 data-lang="podcast_title">

      </p>

      <div class="podcast-card">

        </video>

  </button>

  <footer class="site-footer">

  <div class="carbon-wrapper">

      <div class="carbon-content">
